<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>One Piece AI · Real Icons + Logo</title>
  <!-- Font Awesome 6 (free) for real icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Markdown + code highlighting libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #0f172a;
      --sidebar-bg: #1e293b;
      --border-color: #334155;
      --accent-blue: #2563eb;
      --accent-blue-light: #3b82f6;
      --green: #10b981;
      --green-hover: #059669;
      --text-light: #e2e8f0;
      --text-muted: #94a3b8;
    }

    body, html {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg-dark);
      color: var(--text-light);
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      display: flex;
      height: 100%;
      width: 100%;
      position: relative;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      transition: transform 0.25s ease-in-out;
      z-index: 20;
    }

    @media (max-width: 640px) {
      .sidebar {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        width: 85%;
        max-width: 320px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        background: var(--sidebar-bg);
      }
      .sidebar.open {
        transform: translateX(0);
      }
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 15;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .sidebar-overlay.visible {
        display: block;
        opacity: 1;
        pointer-events: auto;
      }
    }

    .sidebar header {
      padding: 18px 16px;
      font-size: 1.3rem;
      font-weight: 600;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
      color: white;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    /* real icon in sidebar header */
    .sidebar header i {
      color: var(--accent-blue);
      font-size: 1.5rem;
    }

    .sidebar button#newChatBtn {
      margin: 12px 16px 10px;
      padding: 14px 10px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      background: var(--green);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      touch-action: manipulation;
    }
    .sidebar button#newChatBtn i {
      font-size: 1.1rem;
    }
    .sidebar button#newChatBtn:hover { background: var(--green-hover); }
    .sidebar button#newChatBtn:active { transform: scale(0.98); }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .chat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 12px 12px 16px;
      border-radius: 12px;
      margin-bottom: 6px;
      cursor: pointer;
      background: #334155;
      color: var(--text-light);
      font-size: 0.95rem;
      transition: 0.15s;
      gap: 8px;
      border: 1px solid transparent;
      touch-action: manipulation;
    }
    .chat-item:hover { background: #3f4a5c; }
    .chat-item:active { background: #475569; }
    .chat-item.active {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue-light);
    }

    .chat-title {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .delete-chat {
      background: transparent;
      border: none;
      color: inherit;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      line-height: 1;
      opacity: 0.7;
      transition: 0.15s;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delete-chat i {
      font-size: 1.2rem;
    }
    .delete-chat:hover {
      opacity: 1;
      background: rgba(255,255,255,0.2);
    }
    .delete-chat:active {
      background: rgba(255,255,255,0.3);
    }

    /* ===== MAIN CHAT AREA ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* Header with logo + centered title */
    .chat-header {
      padding: 14px 16px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 60px;
      position: relative;
    }

    .header-left {
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .menu-toggle {
      background: transparent;
      border: none;
      color: var(--accent-blue);
      font-size: 1.8rem;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      touch-action: manipulation;
    }
    .menu-toggle i {
      font-size: 1.8rem;
    }
    .menu-toggle:hover { background: #2d3b4f; }
    .menu-toggle:active { background: #3f4a5c; }

    @media (min-width: 641px) {
      .menu-toggle {
        display: none;
      }
      .header-left {
        width: 44px;
      }
    }

    @media (max-width: 640px) {
      .menu-toggle {
        display: flex;
      }
    }

    /* Centered container: logo + title */
    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.3);
    }
    /* Simple "OP" logo – you can replace with any SVG if desired */
    .logo-icon span {
      font-family: 'Segoe UI', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .header-title {
      color: var(--accent-blue);
      font-weight: 600;
      font-size: 1.3rem;
    }

    .header-right {
      width: 44px;
      opacity: 0;
    }

    /* chat messages */
    #chat {
      flex: 1;
      padding: 16px 16px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .msg {
      position: relative;
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 22px;
      line-height: 1.5;
      word-wrap: break-word;
      background: #1e293b;
      align-self: flex-start;
      color: var(--text-light);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-size: 1rem;
    }

    @media (min-width: 768px) {
      .msg { max-width: 75%; }
    }

    .msg.user {
      background: var(--accent-blue);
      align-self: flex-end;
      color: white;
    }

    .msg-content {
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .msg-content p {
      margin: 0 0 10px 0;
    }
    .msg-content p:last-child {
      margin-bottom: 0;
    }

    .msg-content pre {
      position: relative;
      background: #0d1117;
      border-radius: 14px;
      padding: 16px 12px 12px;
      overflow-x: auto;
      margin: 12px 0;
      font-size: 0.9rem;
    }

    .msg-content code {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.9em;
      background: #2d3b4f;
      padding: 3px 8px;
      border-radius: 8px;
    }
    .msg-content pre code {
      background: transparent;
      padding: 0;
      color: #f8f8f2;
    }

    .copy-code-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #2d3b4f;
      border: none;
      color: #e2e8f0;
      font-size: 1.2rem;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      opacity: 0.7;
      transition: 0.15s;
      line-height: 1;
      z-index: 10;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .copy-code-btn i {
      font-size: 1.2rem;
    }
    .copy-code-btn:hover { opacity: 1; background: var(--accent-blue); }
    .copy-code-btn:active { background: #1e3a8a; }
    .copy-code-btn.copied { background: #10b981; color: white; }

    .msg-content img {
      max-width: 100%;
      border-radius: 16px;
      margin: 8px 0;
    }

    .timestamp {
      font-size: 0.65rem;
      opacity: 0.6;
      position: absolute;
      bottom: 6px;
      right: 16px;
    }

    #inputArea {
      display: flex;
      padding: 12px 12px 16px;
      background: #111827;
      border-top: 1px solid var(--border-color);
      gap: 8px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      padding: 14px 18px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      background: #1e293b;
      color: white;
      outline: none;
      min-height: 52px;
      max-height: 150px;
      resize: none;
      font-family: inherit;
      -webkit-appearance: none;
    }
    #input::placeholder { color: var(--text-muted); }

    #sendBtn {
      padding: 0 20px;
      height: 52px;
      font-size: 1rem;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      background: var(--green);
      color: white;
      font-weight: 600;
      transition: background 0.15s;
      min-width: 70px;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #sendBtn i {
      font-size: 1.1rem;
    }
    #sendBtn:hover { background: var(--green-hover); }
    #sendBtn:active { transform: scale(0.96); }
    #sendBtn:disabled {
      background: #4b5563;
      opacity: 0.6;
      transform: none;
    }

    .msg.bot.streaming {
      opacity: 0.9;
      border-left: 4px solid var(--green);
    }

    #chat::-webkit-scrollbar, .chat-list::-webkit-scrollbar {
      width: 6px;
    }
    #chat::-webkit-scrollbar-thumb, .chat-list::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 10px;
    }

    button, .chat-item, .delete-chat {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <header>
      <i class="fas fa-comments"></i> <!-- real icon -->
      <span>Chats</span>
    </header>
    <button id="newChatBtn">
      <i class="fas fa-plus-circle"></i> New Chat
    </button>
    <div class="chat-list" id="chatList"></div>
  </div>

  <!-- MAIN CHAT AREA -->
  <div class="main">
    <div class="chat-header">
      <!-- Left side: menu button -->
      <div class="header-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
          <i class="fas fa-bars"></i>
        </button>
      </div>

      <!-- Centered logo + title -->
      <div class="header-center">
        <div class="logo-icon">
          <span>🔥</span> <!-- simple logo, could be any SVG -->
        </div>
        <span class="header-title">One Piece AI</span>
      </div>

      <!-- Right spacer for perfect centering -->
      <div class="header-right"></div>
    </div>

    <div id="chat"></div>
    <div id="inputArea">
      <input id="input" placeholder="Ask anything..." autofocus>
      <button id="sendBtn"><i class="fas fa-paper-plane"></i> Send</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // --- CONFIG ---
    const API_KEY = "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";  // replace with your key
    const MODEL = "arcee-ai/trinity-large-preview:free";

    // --- STATE ---
    let chats = JSON.parse(localStorage.getItem("chats") || "[]");
    let currentChatId = null;
    let streamingMsgDiv = null;
    let isStreaming = false;

    // DOM elements
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const overlay = document.getElementById('sidebarOverlay');

    // --- SIDEBAR TOGGLE (mobile) ---
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('visible');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
    }

    menuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      if (sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });

    overlay.addEventListener('click', closeSidebar);

    window.addEventListener('resize', () => {
      if (window.innerWidth > 640) {
        closeSidebar();
      }
    });

    // --- UTILS ---
    function getTimestamp() {
      const d = new Date();
      return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    function persistChats() {
      localStorage.setItem("chats", JSON.stringify(chats));
    }

    function generateTitle(text) {
      let title = text.trim().split('\n')[0];
      if (title.length > 35) title = title.substring(0, 32) + '…';
      return title || "New Chat";
    }

    // --- COPY BUTTON (with real icon) ---
    function attachCopyButtons(container) {
      container.querySelectorAll('pre code').forEach((codeBlock) => {
        const pre = codeBlock.parentNode;
        if (pre.querySelector('.copy-code-btn')) return;

        const btn = document.createElement('button');
        btn.className = 'copy-code-btn';
        btn.innerHTML = '<i class="far fa-clipboard"></i>';  // copy icon
        btn.setAttribute('aria-label', 'Copy code');

        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const codeText = codeBlock.textContent || codeBlock.innerText;
          try {
            await navigator.clipboard.writeText(codeText);
            btn.innerHTML = '<i class="fas fa-check"></i>';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.innerHTML = '<i class="far fa-clipboard"></i>';
              btn.classList.remove('copied');
            }, 2000);
          } catch (err) {
            btn.innerHTML = '<i class="fas fa-times"></i>';
            setTimeout(() => {
              btn.innerHTML = '<i class="far fa-clipboard"></i>';
            }, 2000);
          }
        });

        pre.style.position = 'relative';
        pre.appendChild(btn);
      });
    }

    // --- RENDER MARKDOWN ---
    function renderMarkdownToElement(content, container) {
      const rawHtml = marked.parse(content, { mangle: false, headerIds: false });
      container.innerHTML = rawHtml;
      container.querySelectorAll('pre code').forEach((block) => {
        hljs.highlightElement(block);
      });
      attachCopyButtons(container);
    }

    // --- PERMANENT MESSAGE ---
    function addPermanentMessage(role, content, timestamp = null) {
      const chatContainer = document.getElementById("chat");

      const msgDiv = document.createElement("div");
      msgDiv.className = `msg ${role}`;

      const contentDiv = document.createElement("div");
      contentDiv.className = "msg-content";
      renderMarkdownToElement(content, contentDiv);
      msgDiv.appendChild(contentDiv);

      const ts = document.createElement("div");
      ts.className = "timestamp";
      ts.textContent = timestamp || getTimestamp();
      msgDiv.appendChild(ts);

      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      if (currentChatId) {
        const chat = chats.find(c => c.id === currentChatId);
        chat.messages.push({ role, content, timestamp: ts.textContent });
        persistChats();

        if (role === 'user' && chat.title === "New Chat") {
          chat.title = generateTitle(content);
          renderChatList();
          persistChats();
        }
      }
    }

    // --- STREAMING ---
    function updateStreamingMessage(text) {
      const chatContainer = document.getElementById("chat");
      if (!streamingMsgDiv) {
        streamingMsgDiv = document.createElement("div");
        streamingMsgDiv.className = "msg bot streaming";
        const textSpan = document.createElement("span");
        textSpan.style.whiteSpace = "pre-wrap";
        streamingMsgDiv.appendChild(textSpan);
        const ts = document.createElement("div");
        ts.className = "timestamp";
        ts.textContent = getTimestamp();
        streamingMsgDiv.appendChild(ts);
        chatContainer.appendChild(streamingMsgDiv);
      }
      const textSpan = streamingMsgDiv.querySelector('span');
      if (textSpan) textSpan.textContent = text;
      const ts = streamingMsgDiv.querySelector('.timestamp');
      if (ts) ts.textContent = getTimestamp();
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeStreamingDiv() {
      if (streamingMsgDiv && streamingMsgDiv.parentNode) {
        streamingMsgDiv.remove();
        streamingMsgDiv = null;
      }
    }

    // --- DELETE CHAT ---
    function deleteChat(chatId, event) {
      event.stopPropagation();
      if (isStreaming) return;

      const index = chats.findIndex(c => c.id === chatId);
      if (index === -1) return;

      chats.splice(index, 1);
      persistChats();

      if (chats.length === 0) {
        const newChat = {
          id: Date.now().toString(),
          title: "New Chat",
          messages: []
        };
        chats.push(newChat);
        persistChats();
        currentChatId = newChat.id;
        loadChat(newChat.id);
      } else {
        if (currentChatId === chatId) {
          currentChatId = chats[0].id;
          loadChat(currentChatId);
        } else {
          renderChatList();
        }
      }
    }

    // --- LOAD CHAT ---
    function loadChat(id) {
      if (isStreaming) return;
      const chat = chats.find(c => c.id === id);
      if (!chat) return;
      currentChatId = id;

      const chatContainer = document.getElementById("chat");
      chatContainer.innerHTML = '';

      chat.messages.forEach(msg => {
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${msg.role}`;
        const contentDiv = document.createElement("div");
        contentDiv.className = "msg-content";
        renderMarkdownToElement(msg.content, contentDiv);
        msgDiv.appendChild(contentDiv);
        const ts = document.createElement("div");
        ts.className = "timestamp";
        ts.textContent = msg.timestamp || getTimestamp();
        msgDiv.appendChild(ts);
        chatContainer.appendChild(msgDiv);
      });

      chatContainer.scrollTop = chatContainer.scrollHeight;
      renderChatList();
    }

    // --- RENDER CHAT LIST (with delete icon) ---
    function renderChatList() {
      const listDiv = document.getElementById("chatList");
      listDiv.innerHTML = "";
      chats.forEach(chat => {
        const item = document.createElement("div");
        item.className = "chat-item" + (chat.id === currentChatId ? " active" : "");

        const titleSpan = document.createElement("span");
        titleSpan.className = "chat-title";
        titleSpan.textContent = chat.title;
        item.appendChild(titleSpan);

        const delBtn = document.createElement("span");
        delBtn.className = "delete-chat";
        delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        delBtn.setAttribute("aria-label", "Delete chat");
        delBtn.onclick = (e) => deleteChat(chat.id, e);
        item.appendChild(delBtn);

        item.onclick = (e) => {
          if (!e.target.closest('.delete-chat')) {
            loadChat(chat.id);
            if (window.innerWidth <= 640) closeSidebar();
          }
        };

        listDiv.appendChild(item);
      });
    }

    // --- NEW CHAT ---
    document.getElementById("newChatBtn").addEventListener("click", () => {
      if (isStreaming) return;
      const newChat = {
        id: Date.now().toString(),
        title: "New Chat",
        messages: []
      };
      chats.push(newChat);
      persistChats();
      loadChat(newChat.id);
      if (window.innerWidth <= 640) closeSidebar();
    });

    // --- SEND MESSAGE ---
    async function sendMessage() {
      const inputField = document.getElementById("input");
      const text = inputField.value.trim();
      if (!text || isStreaming) return;

      isStreaming = true;
      document.getElementById("sendBtn").disabled = true;
      inputField.disabled = true;

      addPermanentMessage("user", text);
      inputField.value = "";

      const currentChat = chats.find(c => c.id === currentChatId);
      const messagesForApi = currentChat.messages.map(m => ({
        role: m.role,
        content: m.content
      }));

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: MODEL,
            messages: messagesForApi,
            reasoning: { enabled: true },
            stream: true
          })
        });

        if (!response.ok) throw new Error(`API error ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let assistantText = "";
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || trimmed === "data: [DONE]") continue;
            if (trimmed.startsWith("data: ")) {
              const jsonStr = trimmed.slice(6);
              try {
                const parsed = JSON.parse(jsonStr);
                const delta = parsed.choices?.[0]?.delta?.content;
                if (delta) {
                  assistantText += delta;
                  updateStreamingMessage(assistantText);
                }
              } catch (e) { /* ignore */ }
            }
          }
        }

        removeStreamingDiv();
        if (assistantText) {
          addPermanentMessage("assistant", assistantText);
        } else {
          addPermanentMessage("assistant", "(empty response)");
        }

      } catch (err) {
        removeStreamingDiv();
        addPermanentMessage("assistant", `⚠️ Error: ${err.message}`);
      } finally {
        isStreaming = false;
        document.getElementById("sendBtn").disabled = false;
        inputField.disabled = false;
        inputField.focus();
      }
    }

    // --- EVENT LISTENERS ---
    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // --- INIT ---
    if (chats.length === 0) {
      document.getElementById("newChatBtn").click();
    } else {
      loadChat(chats[0].id);
    }

    // open external links in new tab
    document.addEventListener('click', (e) => {
      if (e.target.tagName === 'A' && e.target.target !== '_blank') {
        e.target.target = '_blank';
      }
    });

  })();
</script>
</body>
</html>
